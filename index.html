<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="拼貼寶">
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拼貼寶 · Collage Maker</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f13; --surface: #1a1a24; --surface2: #232333;
  --border: #2e2e45; --gold: #f5c842; --gold-dim: #a88928;
  --text: #e8e8f0; --text-dim: #6a6a8a; --red: #e84855; --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
  overflow: hidden; height: 100vh;
}
header {
  padding: 14px 28px; display: flex; align-items: center; gap: 14px;
  border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0;
}
.pb-icon { width: 32px; height: 32px; }
.logo { font-family: 'Press Start 2P', monospace; font-size: 12px; color: var(--gold); line-height: 1.6; }
.logo span { display: block; font-size: 7px; color: var(--text-dim); margin-top: 3px; letter-spacing: 1px; }
main { flex: 1; display: flex; overflow: hidden; }

/* Sidebar toggle btn in header */
.sidebar-toggle {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); cursor: pointer;
  width: 36px; height: 36px; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0; margin-left: auto;
}
.sidebar-toggle:hover { background: var(--border); color: var(--gold); }

/* Sidebar */
.sidebar {
  width: 270px; min-width: 270px; background: var(--surface);
  border-right: 1px solid var(--border); padding: 20px 16px;
  display: flex; flex-direction: column; gap: 18px; overflow-y: auto;
  transition: transform 0.28s cubic-bezier(.4,0,.2,1), width 0.28s, min-width 0.28s, padding 0.28s;
  flex-shrink: 0;
}
.sidebar.collapsed {
  transform: translateX(-100%);
  width: 0; min-width: 0; padding: 0;
  overflow: hidden; border-right: none;
}

/* Mobile overlay behind sidebar */
.sidebar-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.5); backdrop-filter: blur(2px);
}
.sidebar-overlay.show { display: block; }

/* Mobile: sidebar floats over canvas */
@media (max-width: 600px) {
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 600;
    width: 82vw; min-width: 0; max-width: 320px;
    transform: translateX(-105%);
    padding: 20px 16px; border-right: 1px solid var(--border);
  }
  .sidebar.open {
    transform: translateX(0);
  }
  .sidebar.collapsed { transform: translateX(-105%); width: 82vw; min-width: 0; padding: 20px 16px; overflow-y: auto; border-right: 1px solid var(--border); }
}
.sec-title {
  font-size: 9px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px;
}
.grid-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ctrl-group label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
.stepper {
  display: flex; align-items: center; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px; overflow: hidden; height: 36px;
}
.stepper button {
  background: none; border: none; color: var(--gold); width: 34px;
  height: 100%; font-size: 20px; cursor: pointer; transition: background 0.15s;
  line-height: 0; padding-bottom: 2px;
}
.stepper button:hover { background: var(--border); }
.stepper span { flex: 1; text-align: center; font-size: 16px; font-weight: 600; }
.row-group { display: flex; align-items: center; gap: 8px; }
.row-group input[type="number"] {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); padding: 7px 10px;
  font-size: 14px; font-family: 'Outfit', sans-serif; outline: none; height: 36px;
}
.row-group input[type="number"]:focus { border-color: var(--gold); }
.row-group .unit { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
.format-btns { display: flex; gap: 8px; }
.ratio-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.ratio-btn, .fmt-btn {
  padding: 8px 6px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-dim); font-family: 'Outfit', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; text-align: center;
}
.ratio-btn.active { background: rgba(245,200,66,.15); color: var(--gold); border-color: var(--gold-dim); }
.ratio-btn:hover:not(.active) { background: var(--border); color: var(--text); }
.fmt-btn { font-size: 13px; flex: 1; }
.fmt-btn.active { background: var(--gold); color: #111; border-color: var(--gold); }
.gap-row, .aspect-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
.toggle-sw { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
.toggle-sw input { opacity:0; width:0; height:0; }
.toggle-sw .sl { position: absolute; inset: 0; background: var(--border); border-radius: 20px; cursor: pointer; transition: background 0.2s; }
.toggle-sw .sl:before { content:''; position:absolute; width:14px; height:14px; background:white; border-radius:50%; top:3px; left:3px; transition: transform 0.2s; }
.toggle-sw input:checked + .sl { background: var(--gold); }
.toggle-sw input:checked + .sl:before { transform: translateX(16px); }
.toggle-label { font-size: 12px; color: var(--text-dim); }
.sep { height:1px; background:var(--border); }
.info-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; font-size: 12px; color: var(--text-dim); line-height: 1.9;
}
.info-card .val { color: var(--gold); font-weight: 700; }
.action-btns { display:flex; flex-direction:column; gap:8px; margin-top:auto; }
.btn {
  width:100%; padding:11px; border-radius:10px; border:none;
  font-family:'Outfit',sans-serif; font-size:14px; font-weight:600;
  cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:7px;
}
.btn-export { background:var(--gold); color:#111; }
.btn-export:hover { background:#ffd54f; transform:translateY(-1px); box-shadow:0 4px 18px rgba(245,200,66,.35); }
.btn-clear { background:transparent; border:1px solid var(--border); color:var(--text-dim); }
.btn-clear:hover { background:rgba(232,72,85,.12); border-color:var(--red); color:var(--red); }

/* Canvas Area */
.canvas-area {
  flex:1; display:flex; align-items:flex-start; justify-content:center;
  padding:16px; overflow:auto;
  background:
    radial-gradient(ellipse at 15% 85%, rgba(245,200,66,.05) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 15%, rgba(100,80,200,.04) 0%, transparent 55%),
    var(--bg);
}
#collage-grid {
  display: grid; border-radius: var(--radius); overflow: hidden;
  box-shadow: 0 10px 60px rgba(0,0,0,.6), 0 0 0 1px var(--border); flex-shrink: 0;
}
.cell {
  background: var(--surface2); border: 2px dashed var(--border);
  position: relative; cursor: pointer; overflow: hidden;
  transition: border-color 0.18s, background 0.18s;
  display: flex; align-items: center; justify-content: center; user-select: none;
}
.cell:hover { border-color: var(--gold-dim); background: #2a2a3a; }
.cell.drag-over { border-color: var(--gold) !important; background: rgba(245,200,66,.1) !important; }
.cell.has-image { border: none; cursor: grab; }
.cell.has-image:active { cursor: grabbing; }
.cell.has-text { border: 1px solid var(--border); cursor: pointer; }
.cell.drag-src { opacity: 0.35; }
.cell img { width:100%; height:100%; object-fit:cover; pointer-events:none; display:block; }
.cell-text-preview {
  width:100%; height:100%; display:flex; align-items:center; justify-content:center;
  padding:8px; pointer-events:none; word-break:break-all; white-space:pre-wrap;
  overflow:hidden; line-height:1.45;
}
.ph { text-align:center; pointer-events:none; }
.ph .plus { font-size:22px; color:var(--border); margin-bottom:4px; transition:color 0.18s; }
.ph .hint { font-size:9px; color:var(--text-dim); opacity:0; transition:opacity 0.18s; }
.cell:hover .ph .plus { color: var(--gold-dim); }
.cell:hover .ph .hint { opacity:1; }
.cell-num {
  position:absolute; top:4px; left:5px; background:rgba(0,0,0,.5); color:rgba(255,255,255,.45);
  font-size:9px; padding:1px 5px; border-radius:4px; pointer-events:none; z-index:2;
}
.rm-btn {
  position:absolute; top:4px; right:4px; background:rgba(232,72,85,.85); color:white;
  border:none; border-radius:50%; width:20px; height:20px; font-size:11px;
  cursor:pointer; display:none; align-items:center; justify-content:center;
  transition:background 0.15s; padding:0; z-index:3;
}
.cell:hover .rm-btn { display:flex; }
.rm-btn:hover { background: var(--red); }
#file-input { display:none; }
.toast {
  position:fixed; bottom:20px; right:20px; background:var(--surface); border:1px solid var(--gold);
  border-radius:10px; padding:10px 18px; font-size:13px; color:var(--text);
  transform:translateY(70px); opacity:0; transition:all 0.3s cubic-bezier(.34,1.56,.64,1);
  z-index:9999; pointer-events:none;
}
.toast.show { transform:translateY(0); opacity:1; }
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--gold-dim); }

/* Type Chooser Popup */
.type-popup {
  position:fixed; z-index:1000; background:var(--surface2); border:1px solid var(--border);
  border-radius:12px; padding:10px; display:flex; gap:8px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  animation: popIn 0.18s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from { opacity:0; transform:scale(0.85); } to { opacity:1; transform:scale(1); } }
.type-popup-btn {
  display:flex; flex-direction:column; align-items:center; gap:5px;
  padding:12px 14px; background:var(--surface); border:1px solid var(--border);
  border-radius:10px; color:var(--text); cursor:pointer; transition:all 0.15s;
  font-family:'Outfit',sans-serif; font-size:11px; font-weight:600; min-width:62px;
}
.type-popup-btn:hover { border-color:var(--gold); background:rgba(245,200,66,.1); color:var(--gold); }
.type-popup-btn .icon { font-size:22px; }
.popup-overlay { position:fixed; inset:0; z-index:999; }

/* Text Edit Modal */
.modal-overlay {
  position:fixed; inset:0; z-index:2000; background:rgba(0,0,0,.65);
  backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center;
}
.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:24px; width:440px; max-width:96vw;
  box-shadow:0 20px 60px rgba(0,0,0,.7); animation: popIn 0.2s cubic-bezier(.34,1.56,.64,1);
}
.modal-title { font-size:13px; font-weight:700; color:var(--gold); letter-spacing:1px; margin-bottom:16px; }
.modal textarea {
  width:100%; height:100px; resize:vertical;
  background:var(--surface2); border:1px solid var(--border); border-radius:8px;
  color:var(--text); padding:10px 12px; font-size:15px; outline:none; line-height:1.6;
  font-family:'Times New Roman','標楷體','DFKai-SB',serif; transition:border-color 0.15s;
}
.modal textarea:focus { border-color:var(--gold); }
.modal-row { display:flex; align-items:center; gap:10px; margin-top:12px; }
.modal-row label { font-size:11px; color:var(--text-dim); white-space:nowrap; min-width:70px; }
.modal-row input[type="range"] { flex:1; accent-color:var(--gold); cursor:pointer; }
.size-val { font-size:13px; font-weight:700; color:var(--gold); min-width:42px; text-align:right; }
.color-row { display:flex; align-items:center; gap:10px; margin-top:12px; }
.color-row label { font-size:11px; color:var(--text-dim); min-width:70px; white-space:nowrap; }
.color-pick-wrap { display:flex; align-items:center; gap:8px; flex:1; }
.color-swatch {
  width:28px; height:28px; border-radius:6px; border:2px solid var(--border);
  cursor:pointer; overflow:hidden; flex-shrink:0; position:relative;
}
.color-swatch input[type="color"] {
  position:absolute; inset:-4px; width:calc(100%+8px); height:calc(100%+8px);
  opacity:0; cursor:pointer; border:none; padding:0;
}
.preset-colors { display:flex; gap:5px; flex-wrap:wrap; }
.preset-dot {
  width:20px; height:20px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:all 0.12s; flex-shrink:0;
}
.preset-dot:hover { border-color:var(--gold); transform:scale(1.2); }
.align-btns { display:flex; gap:6px; flex:1; }
.align-btn {
  flex:1; padding:5px; background:var(--surface2); border:1px solid var(--border);
  border-radius:6px; color:var(--text-dim); font-size:13px; cursor:pointer;
  transition:all 0.13s; font-family:'Outfit',sans-serif;
}
.align-btn.active { background:rgba(245,200,66,.15); color:var(--gold); border-color:var(--gold-dim); }
.preview-row { margin-top:14px; }
.preview-row > label { font-size:11px; color:var(--text-dim); display:block; margin-bottom:6px; }
.text-preview-box {
  border-radius:8px; padding:12px 16px; min-height:52px;
  display:flex; align-items:center; justify-content:flex-start;
  font-family:'Times New Roman','標楷體','DFKai-SB',serif;
  word-break:break-all; white-space:pre-wrap; line-height:1.5;
  border:1px solid var(--border);
}
.modal-hint { font-size:10px; color:var(--text-dim); margin-top:8px; }
.modal-footer { display:flex; gap:10px; margin-top:16px; }
.modal-btn {
  flex:1; padding:10px; border:none; border-radius:9px;
  font-family:'Outfit',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.15s;
}
.modal-btn-ok { background:var(--gold); color:#111; }
.modal-btn-ok:hover { background:#ffd54f; }
.modal-btn-cancel { background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); }
.modal-btn-cancel:hover { background:var(--border); }
</style>
</head>
<body>

<header>
  <svg class="pb-icon" viewBox="0 0 32 32" fill="none">
    <circle cx="16" cy="16" r="15" stroke="#f5c842" stroke-width="1.8"/>
    <path d="M1 16h30" stroke="#f5c842" stroke-width="1.8"/>
    <circle cx="16" cy="16" r="4.5" fill="#f5c842"/>
    <circle cx="16" cy="16" r="2.5" fill="#0f0f13"/>
  </svg>
  <div class="logo">拼貼寶 <span>Pokémon Collage Maker · v1.2</span></div>
  <button class="sidebar-toggle" onclick="toggleSidebar()" title="設定">☰</button>
</header>

<main>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div>
      <div class="sec-title">📐 格線設定 Grid Size</div>
      <div class="grid-controls">
        <div class="ctrl-group">
          <label>欄 Columns</label>
          <div class="stepper">
            <button onclick="adj('cols',-1)">−</button><span id="cols-val">4</span><button onclick="adj('cols',1)">+</button>
          </div>
        </div>
        <div class="ctrl-group">
          <label>列 Rows</label>
          <div class="stepper">
            <button onclick="adj('rows',-1)">−</button><span id="rows-val">2</span><button onclick="adj('rows',1)">+</button>
          </div>
        </div>
      </div>
      <div class="gap-row" style="margin-top:10px">
        <label class="toggle-sw"><input type="checkbox" id="show-gap"><span class="sl"></span></label>
        <span class="toggle-label">格間距 4px Cell gap</span>
      </div>
    </div>

    <div>
      <div class="sec-title">📏 格子比例 Cell Ratio</div>
      <div class="ratio-btns">
        <button class="ratio-btn active" onclick="setRatio(9,20)" data-r="9:20">9:20 📱</button>
        <button class="ratio-btn" onclick="setRatio(3,4)" data-r="3:4">3:4</button>
        <button class="ratio-btn" onclick="setRatio(9,16)" data-r="9:16">9:16</button>
        <button class="ratio-btn" onclick="setRatio(2,3)" data-r="2:3">2:3</button>
      </div>
    </div>

    <div>
      <div class="sec-title">🖼 輸出品質 Export Quality</div>
      <div class="ctrl-group">
        <label>每格寬度 px per cell (width)</label>
        <div class="row-group">
          <input type="number" id="cell-size" value="500" min="100" max="2000" step="50">
          <span class="unit">px</span>
        </div>
      </div>
      <div class="aspect-row">
        <label class="toggle-sw"><input type="checkbox" id="keep-aspect" checked><span class="sl"></span></label>
        <span class="toggle-label">保持比例裁切 Cover crop</span>
      </div>
    </div>

    <div>
      <div class="sec-title">💾 輸出格式 Format</div>
      <div class="format-btns">
        <button class="fmt-btn active" onclick="setFmt('png')" id="fmt-png">PNG</button>
        <button class="fmt-btn" onclick="setFmt('jpeg')" id="fmt-jpeg">JPEG</button>
      </div>
    </div>

    <div class="sep"></div>

    <div class="info-card">
      輸出尺寸 Output size：<br>
      <span class="val" id="out-size">—</span><br>
      已填格數 Filled：<span class="val" id="filled">0</span> / <span id="total">8</span>
    </div>

    <div class="action-btns">
      <button class="btn btn-export" onclick="doExport()">⬇ 匯出拼貼圖 Export</button>
      <button class="btn btn-clear" onclick="clearAll()">🗑 清除全部 Clear All</button>
    </div>
  </aside>

  <div class="canvas-area">
    <div id="collage-grid"></div>
  </div>
</main>

<input type="file" id="file-input" accept="image/*" multiple>
<div class="toast" id="toast"></div>

<!-- ── Text Edit Modal ── -->
<div class="modal-overlay" id="text-modal" style="display:none">
  <div class="modal">
    <div class="modal-title">✏️ 文字格設定 Text Cell</div>

    <textarea id="txt-input" placeholder="輸入文字… Enter text here&#10;中文：標楷體　English: Times New Roman"></textarea>

    <div class="modal-row">
      <label>字體大小</label>
      <input type="range" id="txt-size" min="10" max="200" value="36" oninput="syncPreview()">
      <span class="size-val" id="txt-size-val">36 px</span>
    </div>

    <div class="modal-row">
      <label>對齊 Align</label>
      <div class="align-btns">
        <button class="align-btn" data-align="left"   onclick="setAlign('left')"  >◀ 左</button>
        <button class="align-btn active" data-align="center" onclick="setAlign('center')">● 中</button>
        <button class="align-btn" data-align="right"  onclick="setAlign('right')" >▶ 右</button>
      </div>
    </div>

    <div class="color-row">
      <label>文字顏色</label>
      <div class="color-pick-wrap">
        <div class="color-swatch" id="txt-swatch" style="background:#000">
          <input type="color" id="txt-color" value="#000000" oninput="syncPreview()">
        </div>
        <div class="preset-colors" id="txt-presets"></div>
      </div>
    </div>

    <div class="color-row">
      <label>背景顏色</label>
      <div class="color-pick-wrap">
        <div class="color-swatch" id="bg-swatch" style="background:#fff;border-color:#666">
          <input type="color" id="bg-color" value="#ffffff" oninput="syncPreview()">
        </div>
        <div class="preset-colors" id="bg-presets"></div>
      </div>
    </div>

    <div class="preview-row">
      <label>預覽 Preview</label>
      <div class="text-preview-box" id="txt-preview">&nbsp;</div>
    </div>
    <div class="modal-hint">💡 Ctrl+Enter 確認　ESC 取消　文字留空 = 恢復留白</div>

    <div class="modal-footer">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>
      <button class="modal-btn modal-btn-ok" onclick="confirmText()">確定 ✓</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────
let cols = 4, rows = 2;
let cells = [];
let activeCellIdx = null;
let dragSrc = null;
let fmt = 'png';
let ratioW = 9, ratioH = 20;
let editIdx = null;
let curAlign = 'center';

const isMobile = () => window.innerWidth <= 600;

// Dynamic cell width: fit all columns in available canvas area
function getCellW() {
  const canvas = document.querySelector('.canvas-area');
  if (!canvas) return 160;
  const pad = 32; // padding both sides
  const gap = document.getElementById('show-gap')?.checked ? 4 : 0;
  const available = canvas.clientWidth - pad - (cols - 1) * gap;
  const w = Math.floor(available / cols);
  return Math.max(80, Math.min(w, 300));
}
const getCellH = () => Math.round(getCellW() * ratioH / ratioW);
const emptyCell = () => ({ type:'empty', img:null, src:null, text:'', fontSize:36, color:'#000000', align:'center', bgColor:'#ffffff' });

const TXT_PRESETS = ['#000000','#222222','#ffffff','#e84855','#f5c842','#3b82f6','#22c55e','#f97316'];
const BG_PRESETS  = ['#ffffff','#f5f5f5','#fffde7','#fce4ec','#e8eaf6','#e8f5e9','#1a1a24','#000000'];

// ── Init ──────────────────────────────────────────────
function init() {
  const n = cols * rows;
  const old = [...cells];
  cells = Array.from({length:n}, (_,i) => old[i] || emptyCell());
  renderGrid(); updateInfo();
}

// ── Render ────────────────────────────────────────────
function renderGrid() {
  const gap = document.getElementById('show-gap').checked ? 4 : 0;
  const cellW = getCellW();
  const cellH = getCellH();
  const g = document.getElementById('collage-grid');
  g.style.cssText = `display:grid;grid-template-columns:repeat(${cols},${cellW}px);grid-template-rows:repeat(${rows},${cellH}px);gap:${gap}px;padding:${gap}px;border-radius:var(--radius);overflow:hidden;box-shadow:0 10px 60px rgba(0,0,0,.6),0 0 0 1px var(--border);flex-shrink:0;`;
  g.innerHTML = '';

  cells.forEach((c, i) => {
    const el = document.createElement('div');
    el.dataset.i = i;
    el.style.width = cellW+'px'; el.style.height = cellH+'px';

    if (c.type === 'image') {
      el.className = 'cell has-image';
      const img = document.createElement('img');
      img.src = c.src; img.draggable = false;
      el.appendChild(img);
      el.draggable = true;
      el.addEventListener('dragstart', e => { dragSrc = i; setTimeout(() => el.classList.add('drag-src'),0); e.dataTransfer.effectAllowed='move'; });

    } else if (c.type === 'text') {
      el.className = 'cell has-text';
      el.style.background = c.bgColor;
      const pv = document.createElement('div');
      pv.className = 'cell-text-preview';
      const scale = getCellW() / 500;
      pv.style.cssText = `font-size:${Math.max(7, Math.round(c.fontSize*scale))}px;color:${c.color};text-align:${c.align};font-family:'Times New Roman','標楷體','DFKai-SB',serif;`;
      pv.textContent = c.text;
      el.appendChild(pv);

    } else {
      el.className = 'cell';
      el.innerHTML = '<div class="ph"><div class="plus">＋</div><div class="hint">點擊 / 拖曳</div></div>';
    }

    // badge
    const badge = document.createElement('div');
    badge.className = 'cell-num'; badge.textContent = i+1;
    el.appendChild(badge);

    // remove btn
    if (c.type !== 'empty') {
      const rm = document.createElement('button');
      rm.className = 'rm-btn'; rm.innerHTML = '✕';
      rm.onclick = e => { e.stopPropagation(); cells[i]=emptyCell(); renderGrid(); updateInfo(); };
      el.appendChild(rm);
    }

    el.addEventListener('click',     () => onCellClick(i, el));
    el.addEventListener('dragover',  e  => { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', ()  => el.classList.remove('drag-over'));
    el.addEventListener('drop',      e  => handleDrop(e, i));
    g.appendChild(el);
  });
}

// ── Cell Click → popup for empty, modal for text ──────
function onCellClick(i, el) {
  if (cells[i].type === 'image') return;
  if (cells[i].type === 'text') { openModal(i); return; }
  showPopup(i, el);
}

// ── Type Chooser Popup ────────────────────────────────
function showPopup(idx, cellEl) {
  closePopup();
  activeCellIdx = idx;
  const ov = document.createElement('div');
  ov.className = 'popup-overlay'; ov.id = 'popup-ov'; ov.onclick = closePopup;
  const pop = document.createElement('div');
  pop.className = 'type-popup'; pop.id = 'type-pop';

  const mkBtn = (icon, label, fn) => {
    const b = document.createElement('button');
    b.className = 'type-popup-btn';
    b.innerHTML = `<span class="icon">${icon}</span>${label}`;
    b.onclick = e => { e.stopPropagation(); closePopup(); fn(); };
    return b;
  };
  pop.appendChild(mkBtn('🖼','上傳圖片', () => document.getElementById('file-input').click()));
  pop.appendChild(mkBtn('✏️','輸入文字', () => openModal(idx)));
  pop.appendChild(mkBtn('⬜','留　　白', () => {}));

  document.body.appendChild(ov);
  document.body.appendChild(pop);

  const r = cellEl.getBoundingClientRect();
  const pw = pop.offsetWidth || 230;
  const ph = pop.offsetHeight || 90;
  let left = r.left + r.width/2 - pw/2;
  let top  = r.bottom + 6;
  left = Math.max(8, Math.min(left, window.innerWidth - pw - 8));
  if (top + ph > window.innerHeight - 8) top = r.top - ph - 6;
  pop.style.left = left+'px'; pop.style.top = top+'px';
}
function closePopup() {
  document.getElementById('type-pop')?.remove();
  document.getElementById('popup-ov')?.remove();
}

// ── Text Modal ────────────────────────────────────────
function buildPresets() {
  const fill = (containerId, colors, target) => {
    const el = document.getElementById(containerId);
    el.innerHTML = '';
    colors.forEach(c => {
      const d = document.createElement('div');
      d.className = 'preset-dot'; d.style.background = c;
      if (c === '#ffffff') d.style.border = '1.5px solid #666';
      d.onclick = () => { document.getElementById(target).value = c; syncPreview(); };
      el.appendChild(d);
    });
  };
  fill('txt-presets', TXT_PRESETS, 'txt-color');
  fill('bg-presets',  BG_PRESETS,  'bg-color');
}

function openModal(idx) {
  editIdx = idx;
  buildPresets();
  const c = cells[idx];
  const isNew = c.type !== 'text';
  document.getElementById('txt-input').value = isNew ? '' : c.text;
  const fs = isNew ? 36 : c.fontSize;
  document.getElementById('txt-size').value = fs;
  curAlign = isNew ? 'center' : c.align;
  const tc = isNew ? '#000000' : c.color;
  const bc = isNew ? '#ffffff' : c.bgColor;
  document.getElementById('txt-color').value = tc;
  document.getElementById('bg-color').value  = bc;
  document.querySelectorAll('.align-btn').forEach(b => b.classList.toggle('active', b.dataset.align === curAlign));
  syncPreview();
  document.getElementById('text-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('txt-input').focus(), 60);
}
function closeModal() {
  document.getElementById('text-modal').style.display = 'none';
  editIdx = null;
}
function confirmText() {
  if (editIdx === null) return;
  const text = document.getElementById('txt-input').value;
  if (!text.trim()) {
    cells[editIdx] = emptyCell();
  } else {
    cells[editIdx] = {
      type: 'text',
      img: null, src: null,
      text,
      fontSize: parseInt(document.getElementById('txt-size').value),
      color:   document.getElementById('txt-color').value,
      align:   curAlign,
      bgColor: document.getElementById('bg-color').value,
    };
  }
  closeModal(); renderGrid(); updateInfo();
}

function syncPreview() {
  const text = document.getElementById('txt-input').value || ' ';
  const fs   = parseInt(document.getElementById('txt-size').value);
  const tc   = document.getElementById('txt-color').value;
  const bc   = document.getElementById('bg-color').value;
  document.getElementById('txt-size-val').textContent = fs + ' px';
  document.getElementById('txt-swatch').style.background = tc;
  document.getElementById('bg-swatch').style.background  = bc;
  document.getElementById('bg-swatch').style.borderColor = bc === '#ffffff' ? '#666' : bc;
  const pv = document.getElementById('txt-preview');
  const previewFs = Math.min(fs, 32);
  pv.style.cssText = `font-size:${previewFs}px;color:${tc};background:${bc};text-align:${curAlign};font-family:'Times New Roman','標楷體','DFKai-SB',serif;border-radius:8px;padding:12px 16px;min-height:52px;display:flex;align-items:center;word-break:break-all;white-space:pre-wrap;line-height:1.5;border:1px solid var(--border);justify-content:${curAlign==='left'?'flex-start':curAlign==='right'?'flex-end':'center'};`;
  pv.textContent = text;
}

function setAlign(a) {
  curAlign = a;
  document.querySelectorAll('.align-btn').forEach(b => b.classList.toggle('active', b.dataset.align === a));
  syncPreview();
}

document.getElementById('txt-input').addEventListener('input', syncPreview);

// ── Drop ──────────────────────────────────────────────
function handleDrop(e, tgt) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragSrc !== null && dragSrc !== tgt) {
    [cells[dragSrc], cells[tgt]] = [cells[tgt], cells[dragSrc]];
    dragSrc = null; renderGrid(); updateInfo(); return;
  }
  dragSrc = null;
  const files = [...(e.dataTransfer.files||[])].filter(f=>f.type.startsWith('image/'));
  files.forEach((f,off) => { const idx=tgt+off; if(idx<cells.length) loadFile(f,idx); });
}
document.addEventListener('dragend', () => {
  dragSrc = null;
  document.querySelectorAll('.cell').forEach(el => el.classList.remove('drag-src','drag-over'));
});

// ── File Input ────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', function() {
  const files = [...this.files].filter(f=>f.type.startsWith('image/'));
  if (!files.length) return;
  let start = activeCellIdx ?? cells.findIndex(c=>c.type==='empty');
  if (start < 0) start = 0;
  files.forEach((f,off) => { if(start+off<cells.length) loadFile(f,start+off); });
  this.value = ''; activeCellIdx = null;
});
function loadFile(file, idx) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => { cells[idx]={type:'image',img,src:e.target.result,text:'',fontSize:36,color:'#000000',align:'center',bgColor:'#ffffff'}; renderGrid(); updateInfo(); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Controls ──────────────────────────────────────────
function adj(dim, d) {
  if (dim==='cols') { cols=Math.max(1,Math.min(8,cols+d)); document.getElementById('cols-val').textContent=cols; }
  else              { rows=Math.max(1,Math.min(8,rows+d)); document.getElementById('rows-val').textContent=rows; }
  init();
}
function setRatio(w,h) {
  ratioW=w; ratioH=h;
  document.querySelectorAll('.ratio-btn').forEach(b=>b.classList.toggle('active',b.dataset.r===`${w}:${h}`));
  renderGrid(); updateInfo();
}
function setFmt(f) {
  fmt=f;
  document.getElementById('fmt-png').classList.toggle('active',f==='png');
  document.getElementById('fmt-jpeg').classList.toggle('active',f==='jpeg');
}
document.getElementById('show-gap').addEventListener('change', renderGrid);
document.getElementById('cell-size').addEventListener('input', updateInfo);

function updateInfo() {
  const cs  = parseInt(document.getElementById('cell-size').value)||500;
  const gap = document.getElementById('show-gap').checked ? 4 : 0;
  const ch  = Math.round(cs*ratioH/ratioW);
  document.getElementById('out-size').textContent = `${cols*cs+(cols-1)*gap} × ${rows*ch+(rows-1)*gap} px`;
  document.getElementById('filled').textContent = cells.filter(c=>c.type!=='empty').length;
  document.getElementById('total').textContent  = cells.length;
}

// ── Export ────────────────────────────────────────────
function doExport() {
  const cs  = parseInt(document.getElementById('cell-size').value)||500;
  const ka  = document.getElementById('keep-aspect').checked;
  const gap = document.getElementById('show-gap').checked ? 4 : 0;
  const ch  = Math.round(cs*ratioH/ratioW);
  const W   = cols*cs+(cols-1)*gap;
  const H   = rows*ch+(rows-1)*gap;

  const canvas = document.createElement('canvas');
  canvas.width=W; canvas.height=H;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);

  cells.forEach((c,i) => {
    const col=i%cols, row=Math.floor(i/cols);
    const x=col*(cs+gap), y=row*(ch+gap);

    if (c.type==='image') {
      ctx.save(); ctx.beginPath(); ctx.rect(x,y,cs,ch); ctx.clip();
      if (ka) {
        const iw=c.img.naturalWidth, ih=c.img.naturalHeight;
        const sc=Math.max(cs/iw,ch/ih);
        ctx.drawImage(c.img, x+(cs-iw*sc)/2, y+(ch-ih*sc)/2, iw*sc, ih*sc);
      } else { ctx.drawImage(c.img,x,y,cs,ch); }
      ctx.restore();

    } else if (c.type==='text') {
      ctx.fillStyle=c.bgColor; ctx.fillRect(x,y,cs,ch);
      ctx.save(); ctx.beginPath(); ctx.rect(x,y,cs,ch); ctx.clip();
      ctx.fillStyle=c.color;
      ctx.font=`${c.fontSize}px 'Times New Roman','標楷體','DFKai-SB',serif`;
      ctx.textAlign=c.align; ctx.textBaseline='middle';
      const pad=Math.round(cs*0.06), maxW=cs-pad*2;
      const lineH=c.fontSize*1.45;
      const lines=wrapText(ctx,c.text,maxW);
      const startY=y+(ch-lines.length*lineH)/2+lineH/2;
      const tx=c.align==='left'?x+pad:c.align==='right'?x+cs-pad:x+cs/2;
      lines.forEach((ln,li)=>ctx.fillText(ln,tx,startY+li*lineH));
      ctx.restore();

    } else {
      ctx.fillStyle='#ffffff'; ctx.fillRect(x,y,cs,ch);
    }
  });

  const mime=fmt==='png'?'image/png':'image/jpeg';
  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`collage_${cols}x${rows}.${fmt==='jpeg'?'jpg':'png'}`; a.click();
    URL.revokeObjectURL(url); showToast('✓ 拼貼圖匯出完成！');
  }, mime, fmt==='jpeg'?0.95:1);
}

function wrapText(ctx, text, maxW) {
  const result=[];
  text.split('\n').forEach(line => {
    if (!line) { result.push(''); return; }
    // try word-based wrap first (handles Latin)
    const words=line.match(/\S+\s*/g)||[line];
    let cur='';
    words.forEach(w => {
      const test=cur+w;
      if (ctx.measureText(test).width>maxW && cur) { result.push(cur.trimEnd()); cur=w; }
      else cur=test;
    });
    if (cur) result.push(cur.trimEnd());
  });
  return result.length?result:[''];
}

// ── Clear ─────────────────────────────────────────────
function clearAll() {
  if (!cells.some(c=>c.type!=='empty')) return;
  cells=cells.map(()=>emptyCell()); renderGrid(); updateInfo();
  showToast('🗑 已清除所有格子');
}

// ── Toast ─────────────────────────────────────────────
let toastTmr;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTmr); toastTmr=setTimeout(()=>t.classList.remove('show'),2600);
}

// ── Sidebar Toggle ────────────────────────────────────
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  if (isMobile()) {
    const isOpen = sb.classList.contains('open');
    sb.classList.toggle('open', !isOpen);
    ov.classList.toggle('show', !isOpen);
  } else {
    sb.classList.toggle('collapsed');
    setTimeout(renderGrid, 300);
  }
}
document.getElementById('file-input').addEventListener('change', function() {
  if (isMobile()) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('show');
  }
}, true);
window.addEventListener('resize', () => {
  clearTimeout(window._rTmr);
  window._rTmr = setTimeout(renderGrid, 120);
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeModal(); closePopup(); }
  if (e.key==='Enter' && e.ctrlKey && document.getElementById('text-modal').style.display!=='none') confirmText();
});
document.addEventListener('dragover', e=>e.preventDefault());
document.addEventListener('drop', e=>{ if(!e.target.closest('.cell')) e.preventDefault(); });

// Boot
init();
</script>
